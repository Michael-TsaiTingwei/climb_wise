<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Climb Wise 游戏场</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101416;
      --panel: rgba(20, 25, 28, 0.82);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f8f3e8;
      --muted: #c7c1b4;
      --accent: #fd7a1e;
      --neon: #c8ff4d;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(200,255,77,0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(253,122,30,0.14), transparent 24%),
        linear-gradient(160deg, #0c1113, #151b1f);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(125deg, rgba(255,255,255,0.02) 25%, transparent 25%),
        linear-gradient(215deg, rgba(255,255,255,0.02) 25%, transparent 25%);
      background-size: 38px 38px;
      opacity: 0.22;
    }

    #game-root {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      margin: 0 auto;
    }

    .phaser-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 30;
    }

    .phaser-overlay.show {
      display: flex;
    }

    .overlay-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(4, 7, 8, 0.72);
      backdrop-filter: blur(10px);
    }

    .overlay-panel {
      position: relative;
      width: min(92vw, 520px);
      padding: 28px;
      border-radius: 20px;
      background: linear-gradient(160deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .overlay-panel h2 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-family: "Rubik", sans-serif;
    }

    .overlay-panel p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .overlay-btn {
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: transform .2s ease, opacity .2s ease;
    }

    .overlay-btn:hover { transform: translateY(-2px); }

    .overlay-btn.primary {
      color: #141414;
      background: linear-gradient(90deg, var(--neon), var(--accent));
    }

    .overlay-btn.secondary {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <div id="game-root"></div>
  <div id="gameError" style="display:none;position:fixed;inset:0;align-items:center;justify-content:center;padding:24px;z-index:40;color:#f8f3e8;text-align:center;">
    <div style="max-width:520px;padding:28px;border-radius:20px;background:rgba(20,25,28,.9);border:1px solid rgba(255,255,255,.08);box-shadow:0 18px 40px rgba(0,0,0,.28);">
      <h2 style="margin:0 0 12px;font-family:Rubik,sans-serif;">游戏加载失败</h2>
      <p style="margin:0;color:#c7c1b4;line-height:1.8;">Phaser 框架没有成功加载。请刷新页面重试；如果仍然失败，我会继续修。</p>
    </div>
  </div>
  <div id="defaultRoleOverlay" class="phaser-overlay" aria-hidden="true">
    <div class="overlay-backdrop"></div>
    <div class="overlay-panel">
      <h2>默认角色已出场</h2>
      <p>检测到你还没有完成攀岩人格测试，当前使用默认角色。去完成测试获取你的专属角色？</p>
      <div class="button-row">
        <button id="goTestButton" class="overlay-btn primary">去测试</button>
        <button id="playDefaultButton" class="overlay-btn secondary">先用默认角色玩</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script>
    if (typeof Phaser === "undefined") {
      const errorBox = document.getElementById("gameError");
      if (errorBox) errorBox.style.display = "flex";
      throw new Error("Phaser failed to load.");
    }

    const STORAGE_KEYS = {
      user: "climbing_user_data",
      wxapp: "climbing_wxapp_data",
      progress: "climbing_game_progress"
    };

    const MODE = {
      LEAD: "lead",
      BOULDER: "bouldering"
    };

    const HOLD_COLORS = {
      normal: 0x8e9698,
      far: 0x5ab7ff,
      near: 0x6df28b,
      special: 0xf6c54f,
      restore: 0xff6f6f
    };

        holds: [
          { x: 0.48, y: 0.9, type: "normal", start: true },

          { x: 0.62, y: 0.8, type: "far" },
          { x: 0.26, y: 0.7, type: "normal" },
          { x: 0.52, y: 0.69, type: "special" },
          { x: 0.72, y: 0.64, type: "far" },
          { x: 0.36, y: 0.56, type: "near" },
          { x: 0.6, y: 0.5, type: "normal" },
          { x: 0.24, y: 0.42, type: "special" },
          { x: 0.48, y: 0.36, type: "normal" },
          { x: 0.7, y: 0.28, type: "far" },
          { x: 0.54, y: 0.16, type: "normal", finish: true }
        ]
      }
    ];

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerpColor(a, b, t) {
      const ar = (a >> 16) & 0xff;
      const ag = (a >> 8) & 0xff;
      const ab = a & 0xff;
      const br = (b >> 16) & 0xff;
      const bg = (b >> 8) & 0xff;
      const bb = b & 0xff;
      const rr = Math.round(Phaser.Math.Linear(ar, br, t));
      const rg = Math.round(Phaser.Math.Linear(ag, bg, t));
      const rb = Math.round(Phaser.Math.Linear(ab, bb, t));
      return (rr << 16) + (rg << 8) + rb;
    }

    function safeParse(key) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function resolveUserData(sessionId) {
      const payload = safeParse(STORAGE_KEYS.user);
      if (!payload) return null;
      if (payload.session_id && (!sessionId || payload.session_id === sessionId)) return payload;
      if (payload[sessionId]) return payload[sessionId];
      if (Array.isArray(payload)) return payload.find((item) => item.session_id === sessionId) || null;
      return null;
    }

    function resolveWxData(sessionId) {
      const payload = safeParse(STORAGE_KEYS.wxapp);
      if (!payload) return null;
      if (payload.session_id && (!sessionId || payload.session_id === sessionId)) return payload;
      if (payload[sessionId]) return payload[sessionId];
      return payload;
    }

    function readProgress() {
      return safeParse(STORAGE_KEYS.progress) || { unlocked: 1, stars: {}, bestLead: 0 };
    }

    function saveProgress(progress) {
      localStorage.setItem(STORAGE_KEYS.progress, JSON.stringify(progress));
    }

    class CharacterSystem {
      constructor(answerPayload, wxData) {
        this.hasAnswers = Boolean(answerPayload && answerPayload.answers);
        this.sessionId = answerPayload?.session_id || new URLSearchParams(window.location.search).get("session_id") || `guest-${Date.now()}`;
        this.answers = answerPayload?.answers || {
          height: "medium",
          weight: "medium",
          flexibility: "medium",
          grip: "medium",
          preference: "lead"
        };
        this.wxData = wxData || { climb_count: 0, total_time: 0, level: 0 };
        this.base = this.computeBaseAttributes();
        this.bonus = this.computeBonusAttributes();
        this.stats = {
          reach: clamp(this.base.reach + this.bonus.reach, 1, 7),
          stamina: clamp(this.base.stamina + this.bonus.stamina, 1, 7),
          agility: clamp(this.base.agility + this.bonus.agility, 1, 7),
          grip: clamp(this.base.grip + this.bonus.grip, 1, 7),
          speedBonus: clamp(this.bonus.speedBonus, 0, 2)
        };
      }

      computeBaseAttributes() {
        return {
          reach: { short: 2, medium: 3, tall: 4 }[this.answers.height] || 3,
          stamina: { light: 4, medium: 3, heavy: 2 }[this.answers.weight] || 3,
          agility: { high: 4, medium: 3, low: 2 }[this.answers.flexibility] || 3,
          grip: { low: 2, medium: 3, high: 4 }[this.answers.grip] || 3
        };
      }

      computeBonusAttributes() {
        const climbCount = Number(this.wxData.climb_count || 0);
        const totalTime = Number(this.wxData.total_time || 0);
        const level = Number(this.wxData.level || 0);
        return {
          reach: 0,
          stamina: Math.min(2, Math.floor(climbCount / 10) * 0.5),
          agility: 0,
          grip: Math.min(2, Math.floor(totalTime / 60) * 0.5),
          speedBonus: Math.min(2, Math.floor(level / 2) * 0.5)
        };
      }

      get preference() {
        return this.answers.preference === MODE.BOULDER ? MODE.BOULDER : MODE.LEAD;
      }

      get initialEnergy() {
        return this.stats.stamina * 20;
      }

      get movementSpeed() {
        return 200 + this.stats.speedBonus * 30;
      }

      get hangDrain() {
        return 0.5 * (6 - this.stats.grip);
      }

      get reachRadius() {
        return this.stats.reach * 60;
      }

      get blindZoneRadius() {
        return this.stats.reach >= 4 ? this.stats.reach * 15 : 0;
      }

      isReachable(from, to) {
        const distance = Phaser.Math.Distance.Between(from.x, from.y, to.x, to.y);
        if (distance > this.reachRadius) return { ok: false, reason: "够不到！" };
        if (distance < this.blindZoneRadius && this.stats.reach >= 4) return { ok: false, reason: "太近了，别扭！" };
        if (to.type === "far" && this.stats.reach < 4) return { ok: false, reason: "臂展差一点！" };
        if (to.type === "near" && this.stats.reach >= 4) return { ok: false, reason: "太贴身，不好发力！" };
        if (to.type === "special" && this.stats.agility < 4) return { ok: false, reason: "柔韧度不够！" };
        return { ok: true, distance };
      }
    }

    function createCharacterTexture(scene, key, system) {
      if (scene.textures.exists(key)) scene.textures.remove(key);
      const g = scene.make.graphics({ x: 0, y: 0, add: false });
      const width = 110;
      const height = 150;
      const lineWidth = system.answers.weight === "light" ? 5 : system.answers.weight === "heavy" ? 8 : 6;
      const bodyWidth = system.answers.weight === "light" ? 22 : system.answers.weight === "heavy" ? 34 : 28;
      const bodyHeight = system.answers.height === "short" ? 54 : system.answers.height === "tall" ? 82 : 68;
      const armLength = system.answers.height === "tall" ? 38 : system.answers.height === "short" ? 28 : 34;
      const legLength = system.answers.height === "tall" ? 44 : system.answers.height === "short" ? 30 : 36;
      const headRadius = system.answers.height === "short" ? 16 : 14;
      const centerX = width / 2;
      const topY = 24;
      const bodyTop = topY + headRadius + 10;
      const bodyBottom = bodyTop + bodyHeight;
      const accent = system.answers.preference === MODE.BOULDER ? 0xfd7a1e : 0xc8ff4d;

      g.lineStyle(lineWidth, 0xf7f2e7, 1);
      g.strokeCircle(centerX, topY, headRadius);
      g.strokeEllipse(centerX, bodyTop + bodyHeight / 2, bodyWidth, bodyHeight / 2);
      g.beginPath();
      g.moveTo(centerX - 6, bodyTop + 18);
      g.lineTo(centerX - armLength, bodyTop + 26);
      g.moveTo(centerX + 6, bodyTop + 22);
      g.lineTo(centerX + armLength, bodyTop + 12);
      g.moveTo(centerX - 4, bodyBottom);
      g.lineTo(centerX - 14, bodyBottom + legLength);
      g.moveTo(centerX + 4, bodyBottom);
      g.lineTo(centerX + 14, bodyBottom + legLength);
      g.strokePath();

      if (system.wxData && (system.wxData.climb_count || system.wxData.total_time || system.wxData.level)) {
        g.lineStyle(4, accent, 1);
        g.strokeArc(centerX, topY - 2, headRadius + 5, Phaser.Math.DegToRad(195), Phaser.Math.DegToRad(340), false);
        g.strokeLineShape(new Phaser.Geom.Line(centerX - armLength + 2, bodyTop + 24, centerX - armLength + 12, bodyTop + 20));
        g.strokeLineShape(new Phaser.Geom.Line(centerX + armLength - 2, bodyTop + 12, centerX + armLength - 12, bodyTop + 16));
      }

      g.lineStyle(3, accent, 1);
      g.strokeLineShape(new Phaser.Geom.Line(centerX - 18, bodyTop + 18, centerX + 18, bodyTop + 14));
      g.generateTexture(key, width, height);
      g.destroy();
    }

    function showDefaultOverlay(show) {
      const overlay = document.getElementById("defaultRoleOverlay");
      overlay.classList.toggle("show", show);
      overlay.setAttribute("aria-hidden", show ? "false" : "true");
    }

    class BaseScene extends Phaser.Scene {
      createSharpText(x, y, content, style = {}) {
        const text = this.add.text(x, y, content, style);
        if (typeof text.setResolution === "function") {
          text.setResolution(Math.max(2, Math.ceil(window.devicePixelRatio || 1)));
        }
        return text;
      }

      createPanel(x, y, width, height, alpha = 0.92) {
        const panel = this.add.graphics();
        panel.fillStyle(0x1a1f22, alpha);
        panel.fillRoundedRect(x - width / 2, y - height / 2, width, height, 20);
        panel.lineStyle(1, 0xffffff, 0.08);
        panel.strokeRoundedRect(x - width / 2, y - height / 2, width, height, 20);
        return panel;
      }

      createButton(x, y, width, height, label, style = "primary", onClick) {
        const container = this.add.container(x, y);
        const bg = this.add.graphics();
        const colorA = style === "primary" ? 0xc8ff4d : 0x2b3133;
        const colorB = style === "primary" ? 0xfd7a1e : 0x202628;
        bg.fillGradientStyle(colorA, colorB, colorB, colorA, 1);
        bg.fillRoundedRect(-width / 2, -height / 2, width, height, 18);
        if (style !== "primary") {
          bg.lineStyle(1, 0xffffff, 0.08);
          bg.strokeRoundedRect(-width / 2, -height / 2, width, height, 18);
        }
        const text = this.createSharpText(0, 0, label, {
          fontFamily: '"Noto Sans SC"',
          fontSize: 17,
          fontStyle: "700",
          color: style === "primary" ? "#111416" : "#f8f3e8"
        }).setOrigin(0.5);
        container.add([bg, text]);
        const hit = this.add.zone(0, 0, width, height).setInteractive({ useHandCursor: true });
        hit.on("pointerover", () => container.setScale(1.02));
        hit.on("pointerout", () => container.setScale(1));
        hit.on("pointerdown", () => container.setScale(0.98));
        hit.on("pointerup", () => {
          container.setScale(1.02);
          onClick?.();
        });
        container.add(hit);
        return container;
      }

      showToast(message, color = "#fd7a1e") {
        if (!this.toastText) {
          this.toastText = this.createSharpText(this.scale.width / 2, 88, "", {
            fontFamily: '"Noto Sans SC"',
            fontSize: 20,
            fontStyle: "700",
            color: "#f8f3e8",
            backgroundColor: "rgba(0,0,0,0.45)",
            padding: { left: 14, right: 14, top: 8, bottom: 8 }
          }).setOrigin(0.5).setScrollFactor(0).setDepth(50).setAlpha(0);
        }
        this.toastText.setText(message);
        this.toastText.setStyle({ color });
        this.tweens.killTweensOf(this.toastText);
        this.tweens.timeline({
          targets: this.toastText,
          tweens: [
            { alpha: 1, y: 78, duration: 180 },
            { alpha: 1, y: 78, duration: 450 },
            { alpha: 0, y: 70, duration: 240 }
          ]
        });
      }
    }

    class BootScene extends BaseScene {
      constructor() { super("BootScene"); }

      create() {
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get("session_id");
        const userData = resolveUserData(sessionId);
        const wxData = resolveWxData(sessionId);
        const system = new CharacterSystem(userData, wxData);
        const progress = readProgress();

        this.registry.set("characterSystem", system);
        this.registry.set("sessionId", system.sessionId);
        this.registry.set("hasAnswers", system.hasAnswers);
        this.registry.set("progress", progress);
        this.registry.set("preferredMode", system.preference);
        this.registry.set("lastMode", system.preference);

        createCharacterTexture(this, "climber-avatar", system);
        this.scene.start("CharacterScene");
      }
    }

    class CharacterScene extends BaseScene {
      constructor() { super("CharacterScene"); }

      create() {
        const system = this.registry.get("characterSystem");
        const { width, height } = this.scale;
        showDefaultOverlay(false);
        this.add.rectangle(width / 2, height / 2, width, height, 0x101416, 0.001);
        this.createPanel(width / 2, height / 2, Math.min(width - 32, 760), Math.min(height - 48, 620), 0.82);

        this.add.text(width / 2, 64, "你的攀岩角色已生成", {
          fontFamily: '"Rubik"', fontSize: Phaser.Math.Clamp(width / 18, 28, 52), color: "#f8f3e8", fontStyle: "800"
        }).setOrigin(0.5);
        this.add.text(width / 2, 102, system.hasAnswers ? "根据你的问答画像，推荐模式已经高亮。" : "未检测到问答数据，当前使用默认角色。", {
          fontFamily: '"Noto Sans SC"', fontSize: 16, color: "#c7c1b4"
        }).setOrigin(0.5);

        const avatar = this.add.image(width / 2, height * 0.34, "climber-avatar").setScale(width < 600 ? 1.15 : 1.35);
        this.tweens.add({ targets: avatar, angle: { from: -2, to: 2 }, yoyo: true, repeat: -1, duration: 900, ease: "Sine.easeInOut" });

        const labels = [
          ["臂展 Reach", system.base.reach, system.bonus.stamina ? 0 : 0],
          ["体力 Stamina", system.base.stamina, system.bonus.stamina],
          ["灵活度 Agility", system.base.agility, system.bonus.agility || 0],
          ["抓握力 Grip", system.base.grip, system.bonus.grip]
        ];

        labels.forEach(([label, baseValue, bonusValue], index) => {
          const y = height * 0.5 + index * 46;
          this.add.text(width * 0.18, y, label, {
            fontFamily: '"Noto Sans SC"', fontSize: 16, color: "#f8f3e8", fontStyle: "700"
          }).setOrigin(0, 0.5);
          const x = width * 0.42;
          for (let i = 0; i < 7; i += 1) {
            const filledBase = i < baseValue;
            const filledBonus = i >= baseValue && i < baseValue + bonusValue;
            const fill = filledBonus ? 0xf6c54f : filledBase ? 0xf3efe5 : 0x2a3133;
            this.add.rectangle(x + i * 32, y, 22, 16, fill).setOrigin(0.5);
          }
        });

        this.add.text(width / 2, height * 0.73, system.preference === MODE.LEAD ? "推荐模式：爬高模式" : "推荐模式：抱石模式", {
          fontFamily: '"Noto Sans SC"', fontSize: 17, color: "#c8ff4d", fontStyle: "700"
        }).setOrigin(0.5);

    class LeadScene extends BaseScene {

        this.backgroundRect = this.add.rectangle(this.scale.width / 2, this.scale.height / 2, this.scale.width, this.scale.height, 0x4d3a2b).setScrollFactor(0);
        this.wall = this.add.rectangle(this.scale.width / 2, this.scale.height / 2, this.wallWidth, this.scale.height * 4, 0x222b2e).setOrigin(0.5, 0).setScrollFactor(1);

        this.startHold = this.createHold(this.scale.width / 2, 0, "normal", true);
        this.player = this.add.image(this.startHold.x, this.startHold.y, "climber-avatar").setDepth(5).setScale(this.scale.width < 600 ? 0.72 : 0.82);
        this.currentHold = this.startHold;
        this.player.y -= 24;
        this.tweens.add({ targets: this.player, angle: { from: -2, to: 2 }, yoyo: true, repeat: -1, duration: 840, ease: "Sine.easeInOut" });

        }

        this.cameras.main.startFollow(this.player, false, 0.08, 0.08, 0, this.scale.height * 0.1);

        this.createLeadHUD();

      }

        this.energyBar = this.add.rectangle(this.scale.width - 168, 92, 220, 16, 0x6df28b).setOrigin(0, 0.5).setScrollFactor(0);
        this.energyLabel = this.add.text(this.scale.width - 168, 66, "体力", {
          fontFamily: '"Noto Sans SC"',
          fontSize: 16,
          color: "#f8f3e8",
          fontStyle: "700"
        }).setScrollFactor(0);
        this.helpText = this.add.text(this.scale.width / 2, this.scale.height - 36, "点击绿色范围内的岩点移动。蓝=远距，绿=贴身，金=技巧，红=回血。", {
          fontFamily: '"Noto Sans SC"',
          fontSize: 14,
          color: "#f8f3e8",
          backgroundColor: "rgba(0,0,0,0.28)",
          padding: { left: 12, right: 12, top: 6, bottom: 6 }
        }).setOrigin(0.5).setScrollFactor(0).setAlpha(0.9);
        this.tweens.add({ targets: this.helpText, alpha: 0.45, yoyo: true, repeat: -1, duration: 1800, ease: "Sine.easeInOut" });
      }

      createPauseMenu(switchMode) {
        this.pauseOverlay = this.add.container(this.scale.width / 2, this.scale.height / 2).setScrollFactor(0).setDepth(30).setVisible(false);
        const bg = this.add.rectangle(0, 0, this.scale.width, this.scale.height, 0x000000, 0.54);
        const panel = this.add.rectangle(0, 0, Math.min(420, this.scale.width - 40), 280, 0x192023, 0.94).setStrokeStyle(1, 0xffffff, 0.08);
        const title = this.createSharpText(0, -90, "暂停中", { fontFamily: '"Rubik"', fontSize: 36, color: "#f8f3e8", fontStyle: "800" }).setOrigin(0.5);
        const continueBtn = this.createButton(0, -22, 220, 46, "继续游戏", "primary", () => this.togglePauseMenu());
        const restartBtn = this.createButton(0, 34, 220, 46, "重新开始", "secondary", () => this.scene.restart());
        const switchBtn = this.createButton(0, 90, 220, 46, "切换到抱石模式", "secondary", () => {
          this.isPausedMenu = false;
          this.pauseOverlay.setVisible(false);
          this.scene.start("LevelSelectScene");
        });
        const homeBtn = this.createButton(0, 146, 220, 46, "返回首页", "secondary", () => window.location.href = `./index.html`);
        this.pauseOverlay.add([bg, panel, title, continueBtn, restartBtn, switchBtn, homeBtn]);
      }

      togglePauseMenu() {
        this.isPausedMenu = !this.isPausedMenu;
        this.pauseOverlay.setVisible(this.isPausedMenu);
      }

      createHold(x, y, type, start = false, finish = false) {
        const radius = type === "special" ? 16 : type === "restore" ? 15 : 14;
        const hold = this.add.circle(x, y, radius, HOLD_COLORS[type], 1).setStrokeStyle(2, 0xffffff, 0.24).setDepth(3);
        const data = { x, y, type, radius, shape: hold, start, finish };
        if (type === "restore") {
          data.icon = this.createSharpText(x, y, "❤", { fontFamily: '"Rubik"', fontSize: 15, color: "#f8f3e8" }).setOrigin(0.5).setDepth(4);
        }
        this.holds.push(data);
        return data;
      }

      getReachableHolds(originHold = this.currentHold) {
        if (!originHold) return [];
        return this.holds.filter((hold) => {
          if (hold === originHold) return false;
          if (hold.y > originHold.y + 16) return false;
          return this.system.isReachable({ x: originHold.x, y: originHold.y }, hold).ok;
        });
      }

      ensureReachableOptions(minCount = 2) {
        if (!this.currentHold) return;
        let reachable = this.getReachableHolds();
        let attempts = 0;
        while (reachable.length < minCount && attempts < 10) {
          attempts += 1;
          const minRadius = Math.max(62, this.system.blindZoneRadius + 18);
          const maxRadius = Math.max(minRadius + 16, this.system.reachRadius - 18);
          const radius = Phaser.Math.Between(minRadius, maxRadius);
          const angle = Phaser.Math.FloatBetween(-2.45, -0.7);
          let x = this.currentHold.x + Math.cos(angle) * radius;
          let y = this.currentHold.y + Math.sin(angle) * radius;
          x = Phaser.Math.Clamp(x, this.wallX + 54, this.wallX + this.wallWidth - 54);
          y = Math.min(this.currentHold.y - 56, y);
          const tooClose = this.holds.some((hold) => Phaser.Math.Distance.Between(hold.x, hold.y, x, y) < 42);
          if (tooClose) continue;
          const roll = Math.random();
          const type = roll > 0.92 ? "restore" : roll > 0.72 ? "near" : "normal";
          const candidate = { x, y };
          if (!this.system.isReachable({ x: this.currentHold.x, y: this.currentHold.y }, candidate).ok) continue;
          this.createHold(x, y, type);
          reachable = this.getReachableHolds();
        }
      }

      seedStarterHolds() {
        const baseX = this.startHold.x;
        const baseY = this.startHold.y;
        const starterPattern = [
          { x: baseX - 78, y: baseY - 84, type: "normal" },
          { x: baseX + 74, y: baseY - 90, type: "near" },
          { x: baseX - 12, y: baseY - 124, type: "normal" },
          { x: baseX - 92, y: baseY - 156, type: "restore" },
          { x: baseX + 50, y: baseY - 168, type: "normal" },
          { x: baseX - 28, y: baseY - 212, type: "near" },
          { x: baseX + 96, y: baseY - 228, type: "special" },
          { x: baseX + 8, y: baseY - 266, type: "normal" }
        ];

        starterPattern.forEach((hold) => {
          const clampedX = Phaser.Math.Clamp(hold.x, this.wallX + 54, this.wallX + this.wallWidth - 54);
          this.createHold(clampedX, hold.y, hold.type);
        });

        this.nextSpawnY = baseY - 320;
      }

      spawnLeadChunk(rows = 12) {
        for (let row = 0; row < rows; row += 1) {
          const difficultyT = clamp((-this.nextSpawnY) / 5000, 0, 1);
          const distanceScale = 1 + Math.min(1, Math.floor((-this.nextSpawnY) / 500) * 0.05);
          const count = Phaser.Math.Between(3, 5);
          for (let i = 0; i < count; i += 1) {
            const x = Phaser.Math.Between(this.wallX + 44, this.wallX + this.wallWidth - 44);
            const roll = Math.random();
            let type = "normal";
            if (roll > 0.92 - difficultyT * 0.18) type = "far";
            else if (roll > 0.76) type = "near";
            else if (roll > 0.66) type = "special";
            else if (roll > 0.56 && Math.random() > difficultyT * 0.35) type = "restore";
            this.createHold(x, this.nextSpawnY, type);
          }
          this.nextSpawnY -= Phaser.Math.Between(72, 106) * distanceScale;
        }
      }

      findClickedHold(worldX, worldY) {
        return this.holds.find((hold) => Phaser.Math.Distance.Between(worldX, worldY, hold.x, hold.y) <= hold.radius + 10);
      }

      tryMoveToHold(target) {
        if (this.isMoving || target === this.currentHold) return;
        const reach = this.system.isReachable({ x: this.currentHold.x, y: this.currentHold.y }, target);
        if (!reach.ok) {
          this.flashInvalid(target);
          this.showToast(reach.reason, "#ff8b76");
          return;
        }
        this.moveToHold(target, reach.distance);
      }

      flashInvalid(target) {
        this.tweens.add({ targets: target.shape, alpha: { from: 1, to: 0.3 }, yoyo: true, repeat: 2, duration: 90 });
      }

      moveToHold(target, distance) {
        this.isMoving = true;
        this.energy = Math.max(0, this.energy - distance / 10);
        const duration = (distance / this.system.movementSpeed) * 1000;
        const startX = this.player.x;
        const startY = this.player.y;
        this.tweens.addCounter({
          from: 0,
          to: 1,
          duration,
          ease: "Sine.easeInOut",
          onUpdate: (tween) => {
            const value = tween.getValue();
            this.player.x = Phaser.Math.Linear(startX, target.x, value);
            this.player.y = Phaser.Math.Linear(startY, target.y - 24, value) - Math.sin(value * Math.PI) * 26;
          },
          onComplete: () => {
            this.currentHold = target;
            this.player.x = target.x;
            this.player.y = target.y - 24;
            this.isMoving = false;
            if (target.type === "special") this.energy = Math.min(this.system.initialEnergy, this.energy + 8);
            if (target.type === "restore") this.energy = Math.min(this.system.initialEnergy, this.energy + 12);
          }
        });
      }

      update(_, delta) {
        if (this.gameEnded || this.isPausedMenu) return;
        const heightClimbed = Math.max(0, -this.player.y);
        this.maxHeight = Math.max(this.maxHeight, heightClimbed);
        this.score = Math.floor(this.maxHeight / 10);
        this.scoreText.setText(`高度 ${this.score}`);
        if (!this.isMoving) this.energy = Math.max(0, this.energy - (delta / 1000) * this.system.hangDrain);
        this.energyBar.width = 220 * (this.energy / this.system.initialEnergy);
        this.energyBar.fillColor = this.energy / this.system.initialEnergy > 0.55 ? 0x6df28b : this.energy / this.system.initialEnergy > 0.28 ? 0xf6c54f : 0xff6f6f;
        this.reachRing.setPosition(this.player.x, this.player.y + 24);
        if (this.blindRing) this.blindRing.setPosition(this.player.x, this.player.y + 24);
        if (this.player.y < this.nextSpawnY + 1200) this.spawnLeadChunk(10);
        this.updateBackgroundByHeight();
        if (this.energy <= 0) this.triggerLeadGameOver();
      }

      updateBackgroundByHeight() {
        const t = clamp(this.maxHeight / 3000, 0, 1);
        this.backgroundRect.fillColor = lerpColor(0x5b3d2e, 0x132d44, t);
      }

      triggerLeadGameOver() {
        if (this.gameEnded) return;
        this.gameEnded = true;
        const progress = readProgress();
        progress.bestLead = Math.max(progress.bestLead || 0, this.score);
        saveProgress(progress);
        this.registry.set("progress", progress);
        this.tweens.add({
          targets: this.player,
          y: this.player.y + 260,
          alpha: 0,
          angle: 16,
          duration: 850,
          ease: "Cubic.easeIn",
          onComplete: () => {
            this.registry.set("lastResult", {
              mode: MODE.LEAD,
              score: this.score,
              best: progress.bestLead,
              title: "今天先到这里",
              message: "松手滑落了，但你已经把岩壁的脾气摸得很透了。"
            });
            this.scene.start("GameOverScene");
          }
        });
      }
    }

    class LevelSelectScene extends BaseScene {

        this.registry.set("lastMode", MODE.BOULDER);

      togglePauseMenu() {

      tryMoveToHold(target) {
        if (this.isMoving || target === this.currentHold || this.gameEnded) return;
        const reach = this.system.isReachable(this.currentHold, target);
        if (!reach.ok) {
          this.flashInvalid(target);
          this.showToast(reach.reason, "#ff8b76");
          return;
        }
        this.moveToHold(target, reach.distance);
      }

      flashInvalid(target) {
        this.tweens.add({ targets: target.shape, alpha: { from: 1, to: 0.3 }, yoyo: true, repeat: 2, duration: 90 });
      }

      moveToHold(target, distance) {
        this.isMoving = true;
        this.steps += 1;
        this.infoText.setText(`步数 ${this.steps} / 最优 ${this.level.optimalSteps}`);
        this.energy = Math.max(0, this.energy - distance / 10);
        const duration = (distance / this.system.movementSpeed) * 1000;
        const sx = this.player.x;
        const sy = this.player.y;
        this.tweens.addCounter({
          from: 0,
          to: 1,
          duration,
          ease: "Sine.easeInOut",
          onUpdate: (tween) => {
            const t = tween.getValue();
            this.player.x = Phaser.Math.Linear(sx, target.x, t);
            this.player.y = Phaser.Math.Linear(sy, target.y - 24, t) - Math.sin(t * Math.PI) * 20;
          },
          onComplete: () => {
            this.currentHold = target;
            this.player.x = target.x;
            this.player.y = target.y - 24;
            this.isMoving = false;
            if (target.type === "special") this.energy = Math.min(this.system.initialEnergy, this.energy + 6);
            if (target.type === "restore") this.energy = Math.min(this.system.initialEnergy, this.energy + 12);
            if (target.finish) this.triggerLevelComplete();
          }
        });
      }

      update(_, delta) {
        if (this.gameEnded || this.isPausedMenu) return;
        if (!this.isMoving) this.energy = Math.max(0, this.energy - (delta / 1000) * this.system.hangDrain);
        this.energyBar.width = 210 * (this.energy / this.system.initialEnergy);
        this.energyBar.fillColor = this.energy / this.system.initialEnergy > 0.55 ? 0x6df28b : this.energy / this.system.initialEnergy > 0.28 ? 0xf6c54f : 0xff6f6f;
        this.reachRing.setPosition(this.player.x, this.player.y + 24);
        if (this.blindRing) this.blindRing.setPosition(this.player.x, this.player.y + 24);
        if (this.energy <= 0) this.triggerBoulderFail();
      }

      triggerBoulderFail() {
        if (this.gameEnded) return;
        this.gameEnded = true;
        this.registry.set("lastResult", {
          mode: MODE.BOULDER,
          success: false,
          levelId: this.level.id,
          title: `${this.level.name} 失败了`,
          message: "体力见底，今天先把墙留一半给明天的你。",
          steps: this.steps,
          optimalSteps: this.level.optimalSteps
        });
        this.scene.start("GameOverScene");
      }

      triggerLevelComplete() {
        if (this.gameEnded) return;
        this.gameEnded = true;
        const ratio = this.steps <= this.level.optimalSteps ? 3 : this.steps <= this.level.optimalSteps * 1.5 ? 2 : 1;
        const staminaRate = this.energy / this.system.initialEnergy;
        const stars = ratio === 3 && staminaRate >= 0.5 ? 3 : ratio;
        const progress = readProgress();
        progress.stars[this.level.id] = Math.max(progress.stars[this.level.id] || 0, stars);
        progress.unlocked = Math.max(progress.unlocked || 1, Math.min(5, this.level.id + 1));
        saveProgress(progress);
        this.registry.set("progress", progress);
        this.registry.set("lastResult", {
          mode: MODE.BOULDER,
          success: true,
          levelId: this.level.id,
          title: `${this.level.name} 通关`,
          message: this.level.intro,
          stars,
          steps: this.steps,
          optimalSteps: this.level.optimalSteps,
          nextLevelUnlocked: this.level.id < 5
        });
        this.scene.start("GameOverScene");
      }
    }

    class GameOverScene extends BaseScene {
      constructor() { super("GameOverScene"); }

      create() {
        const result = this.registry.get("lastResult") || { mode: MODE.LEAD, score: 0, best: 0, title: "继续向上", message: "再来一次。" };
        const system = this.registry.get("characterSystem");
        const { width, height } = this.scale;
        this.createPanel(width / 2, height / 2, Math.min(width - 32, 720), Math.min(height - 40, 560), 0.84);
        this.add.text(width / 2, 74, result.mode === MODE.LEAD ? "本次攀高结算" : "抱石关卡结算", { fontFamily: '"Rubik"', fontSize: Phaser.Math.Clamp(width / 18, 28, 48), color: "#f8f3e8", fontStyle: "800" }).setOrigin(0.5);
        this.add.text(width / 2, 122, result.title, { fontFamily: '"Noto Sans SC"', fontSize: 22, color: "#c8ff4d", fontStyle: "700" }).setOrigin(0.5);
        this.add.text(width / 2, 170, result.message, { fontFamily: '"Noto Sans SC"', fontSize: 16, color: "#c7c1b4", align: "center", wordWrap: { width: Math.min(560, width - 80) } }).setOrigin(0.5);

        if (result.mode === MODE.LEAD) {
          this.add.text(width / 2, 248, `本次高度：${result.score}\n历史最高：${result.best}`, { fontFamily: '"Rubik"', fontSize: 34, color: "#f8f3e8", align: "center", lineSpacing: 12 }).setOrigin(0.5);
        } else {
          this.add.text(width / 2, 252, result.success ? `${"★".repeat(result.stars)}${"☆".repeat(3 - result.stars)}` : "☆ 挑战失败 ☆", { fontFamily: '"Rubik"', fontSize: 42, color: result.success ? "#f6c54f" : "#ff8b76" }).setOrigin(0.5);
          this.add.text(width / 2, 302, `你的步数 ${result.steps} / 最优步数 ${result.optimalSteps}`, { fontFamily: '"Noto Sans SC"', fontSize: 18, color: "#f8f3e8" }).setOrigin(0.5);
        }

        this.add.text(width / 2, 366, `角色属性：臂展 ${system.stats.reach} · 体力 ${system.stats.stamina} · 灵活度 ${system.stats.agility} · 抓握力 ${system.stats.grip}`, { fontFamily: '"Noto Sans SC"', fontSize: 15, color: "#c7c1b4", align: "center", wordWrap: { width: Math.min(600, width - 80) } }).setOrigin(0.5);
        const primaryLabel = result.mode === MODE.LEAD ? "再来一次" : result.success && result.nextLevelUnlocked ? "下一关" : "重玩本关";
        const secondaryLabel = result.mode === MODE.LEAD ? "切换到抱石模式" : "改玩爬高模式";
        this.createButton(width / 2 - 130, height - 116, 220, 50, primaryLabel, "primary", () => {
          if (result.mode === MODE.LEAD) this.scene.start("LeadScene");
          else if (result.success && result.nextLevelUnlocked) this.scene.start("BoulderingScene", { levelId: Math.min(5, result.levelId + 1) });
          else this.scene.start("BoulderingScene", { levelId: result.levelId });
        });
        this.createButton(width / 2 + 130, height - 116, 220, 50, secondaryLabel, "secondary", () => {
          if (result.mode === MODE.LEAD) this.scene.start("LevelSelectScene");
          else this.scene.start("LeadScene");
        });
        this.createButton(width / 2, height - 54, 320, 44, "去小程序记录你的真实攀岩数据 →", "secondary", () => {
          const url = new URL("https://example.com/climb-wise-mini-program");
          url.searchParams.set("session_id", system.sessionId);
          window.location.href = url.toString();
        });
      }
    }

    const config = {
      type: Phaser.AUTO,
      parent: "game-root",
      backgroundColor: "#101416",
      render: {
        antialias: true,
        pixelArt: false,
        roundPixels: true
      },
      resolution: Math.max(2, Math.min(3, window.devicePixelRatio || 1)),
      autoRound: true,
      scale: {
        mode: Phaser.Scale.RESIZE,
        width: window.innerWidth,
        height: window.innerHeight
      },
      scene: [BootScene, CharacterScene, LeadScene, LevelSelectScene, BoulderingScene, GameOverScene]
    };

    new Phaser.Game(config);
  </script>
</body>
</html>
